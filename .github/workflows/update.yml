name: Update daily brief
on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: daily-brief-update
  cancel-in-progress: true
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Generate brief from RSS
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-lite
        run: python scripts/update_brief.py
      - name: Commit archive
        run: |
          git config user.name "daily-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/briefs.json
          git diff --cached --quiet || git commit -m "Update daily brief $(date -u +%F)"
          git push

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Industry Brief</title>
<style>
:root{--bg:#f4f3ee;--card:#fff;--text:#202528;--muted:#71777b;--line:#dedfd9;--accent:#76502f}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.wrap{max-width:980px;margin:auto;padding:24px 16px 50px}.top{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;margin-bottom:20px}
h1{font-size:30px;margin:0}.sub{color:var(--muted);font-size:14px;margin-top:7px}.controls{display:flex;gap:8px;flex-wrap:wrap}
select,button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text)}
button.active{background:var(--text);color:#fff}.hero,.card{background:var(--card);border:1px solid var(--line);border-radius:17px;padding:21px}
.hero{margin-bottom:14px}.date{color:var(--accent);font-weight:700;font-size:13px;letter-spacing:.08em}.summary{font-size:18px;line-height:1.65;margin-top:9px}
.card{margin:12px 0}.card h2{font-size:21px;line-height:1.35;margin:0 0 13px}.label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-weight:700;margin-top:13px}
p{line-height:1.7;margin:5px 0}.sources{border-top:1px solid var(--line);margin-top:14px;padding-top:11px;font-size:13px;color:var(--muted)}
.sources a{color:inherit}.status{text-align:center;color:var(--muted);padding:30px}.footer{text-align:center;color:var(--muted);font-size:12px;margin-top:24px}
@media(max-width:700px){.top{flex-direction:column}.controls{width:100%}select{flex:1}h1{font-size:25px}.summary{font-size:16px}}
</style>
</head>
<body><main class="wrap">
<div class="top"><div><h1 id="title">每日行业简报</h1><div class="sub" id="subtitle">中英文双版本 · 按日期回溯 · 每日自动更新</div></div>
<div class="controls"><select id="dates"></select><button id="zh" class="active">CH</button><button id="en">EN</button></div></div>
<div id="app" class="status">Loading…</div><div class="footer">Daily Industry Brief Archive</div>
</main>
<script>
let all=[],lang="zh";const app=document.querySelector("#app"),dates=document.querySelector("#dates");
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
async function load(){try{const r=await fetch("data/briefs.json?ts="+Date.now());if(!r.ok)throw Error(r.status);all=await r.json();all.sort((a,b)=>b.date.localeCompare(a.date));dates.innerHTML=all.map(x=>`<option>${esc(x.date)}</option>`).join("");render()}catch(e){app.textContent="Unable to load archive / 无法加载归档";}}
function render(){const b=all.find(x=>x.date===dates.value)||all[0];if(!b){app.textContent="No briefs yet / 暂无简报";return}
document.documentElement.lang=lang==="zh"?"zh-CN":"en";document.querySelector("#title").textContent=lang==="zh"?"每日行业简报":"Daily Industry Brief";
document.querySelector("#subtitle").textContent=lang==="zh"?"中英文双版本 · 按日期回溯 · 每日自动更新":"Chinese / English · Browse by date · Updated daily";
document.querySelector("#zh").classList.toggle("active",lang==="zh");document.querySelector("#en").classList.toggle("active",lang==="en");
let h=`<section class="hero"><div class="date">${esc(b.date)}</div><div class="summary">${esc(lang==="zh"?b.zh_summary:b.en_summary)}</div></section>`;
(b.items||[]).forEach((x,i)=>{const src=(x.sources||[]).map(s=>s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name||s.url)}</a>`:esc(s.name||s)).join(" · ");
h+=`<article class="card"><h2>${i+1}. ${esc(lang==="zh"?x.zh_head:x.en_head)}</h2>
<div class="label">${lang==="zh"?"事实摘要":"Facts"}</div><p>${esc(lang==="zh"?x.zh_fact:x.en_fact)}</p>
<div class="label">${lang==="zh"?"为什么值得关注":"Why it matters"}</div><p>${esc(lang==="zh"?x.zh_why:x.en_why)}</p>
${(lang==="zh"?x.insight_zh:x.insight_en)?`<div class="label">${lang==="zh"?"通用判断":"General insight"}</div><p>${esc(lang==="zh"?x.insight_zh:x.insight_en)}</p>`:""}
<div class="label">${lang==="zh"?"继续跟踪":"Watch"}</div><p>${esc(lang==="zh"?x.zh_watch:x.en_watch)}</p>
<div class="sources">${lang==="zh"?"来源":"Sources"}：${src||"—"}</div></article>`});app.innerHTML=h}
dates.onchange=render;document.querySelector("#zh").onclick=()=>{lang="zh";render()};document.querySelector("#en").onclick=()=>{lang="en";render()};load();
</script></body></html>
